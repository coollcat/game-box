<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>极速狂飙 - AI 游戏盒子</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .game-header { padding: 4px 0 6px; gap: 8px; }
    .game-header h1 { font-size: 1.1rem; }
    #racing-canvas {
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      background: #1a1a2e;
      touch-action: none;
      width: 100%;
      max-width: 420px;
      height: auto;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      font-size: 0.85rem;
      color: #eee;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .hud span { font-weight: 600; }
    .controls { margin-top: 8px; display: flex; gap: 8px; justify-content: center; }
    .controls .btn { min-width: 90px; }
    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,25,0.85);
      border-radius: 12px;
      color: #fff;
      z-index: 10;
      cursor: pointer;
    }
    .start-overlay h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .start-overlay p { font-size: 0.85rem; color: #aaa; }
    .canvas-wrap { position: relative; display: inline-block; }
    .touch-controls {
      display: none;
      justify-content: center;
      gap: 20px;
      margin: 10px 0 0;
    }
    .touch-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-drag: none;
    }
    .touch-btn:active { background: rgba(255,255,255,0.2); }
    .hud-effects {
      display: flex;
      justify-content: center;
      gap: 10px;
      min-height: 24px;
      margin: -2px 0 8px;
      font-size: 1rem;
    }
    .effect-icon {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2px 10px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .mode-list { gap: 10px; }
    .online-info { font-size: 0.8rem; }
    @media (pointer: coarse) {
      .touch-controls { display: flex; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="/" class="back-link">← 返回</a>
      <h1>🏎️ 极速狂飙</h1>
    </div>

    <div id="lobby" class="screen active">
      <div class="card">
        <div class="form-group">
          <label>你的名字</label>
          <input type="text" id="player-name" placeholder="Player" maxlength="16">
        </div>
        <div class="mode-list">
          <button class="btn btn-primary" onclick="startMode('local')">👤 单人挑战</button>
          <button class="btn btn-secondary" onclick="startMode('online')">🌐 双人联机开黑</button>
        </div>
      </div>

      <div id="online-panel" class="card" style="margin-top:14px;">
        <div class="form-group" style="margin-bottom:10px;">
          <label class="sound-toggle" title="公开房间会显示在首页房间列表，私有房间只能通过房间号加入"><input type="checkbox" id="room-public-check" checked> 公开房间（可被搜索）</label>
          <div id="room-privacy-hint" class="privacy-hint"></div>
        </div>
        <button class="btn btn-primary" onclick="createRoom()">➕ 创建房间</button>
        <button class="btn btn-secondary" onclick="showJoin()">🔗 加入房间</button>
        <button class="btn btn-warning" onclick="quickMatch()">⚡ 快速匹配</button>
        <div id="join-form" class="hidden" style="margin-top:12px;">
          <div class="form-group">
            <label>房间号</label>
            <input type="text" id="room-id" placeholder="XXXXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;text-align:center;">
          </div>
          <button class="btn btn-primary" onclick="joinRoom()">进入房间</button>
        </div>
        <div id="error-msg" class="status-bar hidden" style="background:rgba(255,77,77,.15);color:#ff6b6b;"></div>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="status-bar" id="online-status-bar" style="display:none;">
        <div class="room-info-bar">
          <span>房间:</span>
          <span id="room-display" class="room-id">-</span>
          <button class="btn btn-ghost" style="width:auto;padding:6px 10px;font-size:.8rem;" id="copy-btn" onclick="copyLink()">📋 复制</button>
        </div>
        <div class="player-badges">
          <span id="badge-p1" class="badge"><b id="name-p1">-</b></span>
          <span id="badge-p2" class="badge"><b id="name-p2">-</b></span>
        </div>
        <div id="status-text">等待开始…</div>
      </div>

      <div class="hud">
        <div>🏁 <span id="hud-score">0</span> m</div>
        <div>⚡ <span id="hud-speed">60</span> km/h</div>
        <div>❤️ <span id="hud-lives">3</span></div>
        <div>🏆 <span id="hud-best">0</span></div>
      </div>
      <div class="hud-effects" id="hud-effects"></div>

      <div class="canvas-wrap">
        <canvas id="racing-canvas" width="360" height="600"></canvas>
        <div class="start-overlay" id="start-overlay">
          <h2>🏎️ 极速狂飙</h2>
          <p>躲避车辆，尽可能跑得更远！</p>
          <p style="margin-top:12px;font-size:1rem;">点击 / 按空格开始</p>
        </div>
      </div>

      <div class="touch-controls" id="touch-controls">
        <button class="touch-btn" id="btn-left">◀</button>
        <button class="touch-btn" id="btn-right">▶</button>
      </div>

      <div class="controls" id="local-controls">
        <button class="btn btn-primary" onclick="startGame()">▶ 开始</button>
        <button class="btn btn-warning" onclick="pauseGame()">⏸ 暂停</button>
        <button class="btn btn-ghost" id="music-btn" onclick="toggleMusic()">🎵 音乐</button>
      </div>

      <div class="controls hidden" id="online-controls">
        <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>等待队友加入</button>
        <button class="btn btn-warning" onclick="resetGame()">🔄 重置</button>
        <button class="btn btn-danger" onclick="leaveGame()">🚪 离开</button>
      </div>
    </div>
  </div>

  <div id="end-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="end-title">💥 撞车了！</h2>
      <p id="end-subtitle">距离: 0m</p>
      <button class="btn btn-primary" onclick="startGame()">再来一局</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/auth.js"></script>
  <script src="/games/racing.js"></script>
</body>
</html>
