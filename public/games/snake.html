<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>贪吃蛇 - AI 游戏盒子</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Snake-specific controls */
    .dpad {
      gap: 10px;
      margin-top: 18px;
      margin-bottom: 8px;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }
    .dpad-row {
      gap: 10px;
      justify-content: center;
    }
    .dpad-btn {
      flex: 1 1 auto;
      min-width: 96px;
      min-height: 68px;
      width: 96px;
      height: 68px;
      border-radius: 16px;
      font-size: 1.6rem;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .map-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .map-chip {
      flex: 1 1 calc(50% - 10px);
      min-width: 120px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .map-chip:active {
      transform: scale(0.97);
    }
    .map-chip.selected {
      background: rgba(107,203,119,0.25);
      border-color: rgba(107,203,119,0.55);
      box-shadow: inset 0 0 10px rgba(107,203,119,0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="/" class="back-link">← 返回</a>
      <h1>🐍 贪吃蛇</h1>
      <div class="settings-row">
        <label class="sound-toggle"><input type="checkbox" id="music-check" checked> 🎵 音乐</label>
        <label class="sound-toggle"><input type="checkbox" id="sfx-check" checked> 🔊 音效</label>
      </div>
    </div>

    <div id="lobby" class="screen active">
      <div class="card">
        <div class="form-group">
          <label>你的名字</label>
          <input type="text" id="player-name" placeholder="Player" maxlength="16">
        </div>
        <div class="form-group" style="margin-bottom:10px;">
          <label class="sound-toggle" title="公开房间会显示在首页房间列表，私有房间只能通过房间号加入"><input type="checkbox" id="room-public-check" checked> 公开房间（可被搜索）</label>
        <div id="room-privacy-hint" class="privacy-hint"></div>
        </div>
        <div class="mode-list">
          <button class="btn btn-primary" onclick="startSingle()">🎮 单人模式</button>
          <button class="btn btn-secondary" onclick="createRoom()">➕ 创建房间</button>
          <button class="btn btn-warning" onclick="showJoin()">🔗 加入房间</button>
          <button class="btn btn-warning" onclick="quickMatch()">⚡ 快速匹配</button>
        </div>
        <div class="form-group" id="single-map-group" style="margin-top:12px;">
          <label>单人地图</label>
          <div class="map-chips" id="single-map-chips">
            <button class="map-chip selected" data-map="empty" onclick="selectSingleMap('empty')">Empty 🌌</button>
            <button class="map-chip" data-map="box" onclick="selectSingleMap('box')">Box 📦</button>
            <button class="map-chip" data-map="cross" onclick="selectSingleMap('cross')">Cross ❌</button>
            <button class="map-chip" data-map="maze" onclick="selectSingleMap('maze')">Maze 🧱</button>
          </div>
          <input type="hidden" id="single-map" value="empty">
        </div>
        <div id="join-form" class="hidden" style="margin-top:12px;">
          <div class="form-group">
            <label>房间号</label>
            <input type="text" id="room-id" placeholder="XXXXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;text-align:center;">
          </div>
          <button class="btn btn-primary" onclick="joinRoom()">进入房间</button>
        </div>
        <div id="error-msg" class="status-bar hidden" style="background:rgba(255,77,77,.15);color:#ff6b6b;"></div>
      </div>
    </div>

    <div id="room" class="screen">
      <div class="card">
        <div class="room-info-bar">
          <span>房间:</span>
          <span id="room-display" class="room-id">-</span>
          <button class="btn btn-ghost" style="width:auto;padding:6px 10px;font-size:.8rem;" id="copy-btn" onclick="copyLink()">📋 复制</button>
        </div>
        <div class="form-group" id="map-select-group" style="margin-top:10px;">
          <label>地图</label>
          <div class="map-chips" id="room-map-chips">
            <button class="map-chip selected" data-map="empty" onclick="setMap('empty')">Empty 🌌</button>
            <button class="map-chip" data-map="box" onclick="setMap('box')">Box 📦</button>
            <button class="map-chip" data-map="cross" onclick="setMap('cross')">Cross ❌</button>
            <button class="map-chip" data-map="maze" onclick="setMap('maze')">Maze 🧱</button>
          </div>
        </div>
        <div id="players-status" style="margin:12px 0; font-size:0.9rem; color:#ccc;"></div>
        <div id="team-label" style="margin-bottom:8px; font-size:0.9rem; color:#ffd93d;"></div>
        <div class="mode-list">
          <button class="btn btn-primary" id="ready-btn" onclick="toggleReady()">👍 准备</button>
          <button class="btn btn-warning" id="start-btn" onclick="startGame()" disabled>▶️ 开始游戏</button>
        </div>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="status-bar" id="single-status" style="display:none;">
        <span>得分:<b id="single-score">0</b></span>
        <span style="margin-left:14px;">长度:<b id="single-length">3</b></span>
      </div>
      <div class="status-bar" id="multi-status">
        <span>P1 得分:<b id="score-1">0</b> 生命:<b id="lives-1">3</b></span>
        <span style="margin-left:14px;">P2 得分:<b id="score-2">0</b> 生命:<b id="lives-2">3</b></span>
      </div>
      <div id="game-message" class="status-bar" style="margin-top:6px;">-</div>

      <canvas id="snake-canvas" width="320" height="320"></canvas>

      <div class="dpad">
        <div class="dpad-row"><button class="dpad-btn" onpointerdown="setDir('up')">▲</button></div>
        <div class="dpad-row">
          <button class="dpad-btn" onpointerdown="setDir('left')">◀</button>
          <button class="dpad-btn" onpointerdown="setDir('right')">▶</button>
        </div>
        <div class="dpad-row"><button class="dpad-btn" onpointerdown="setDir('down')">▼</button></div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="resetGame()">🔄 重置</button>
        <button class="btn btn-danger" onclick="leaveGame()">🚪 离开</button>
      </div>
    </div>
  </div>

  <div id="end-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="end-title">游戏结束</h2>
      <button class="btn btn-primary" onclick="rematchGame()">再来一局</button>
      <button class="btn btn-ghost" onclick="leaveGame()">返回大厅</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/sounds.js"></script>
  <script src="/auth.js"></script>
  <script src="/games/snake.js"></script>
</body>
</html>
