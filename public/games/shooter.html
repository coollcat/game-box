<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>太空射击 - AI 游戏盒子</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .game-header { padding: 4px 0 6px; gap: 8px; }
    .game-header h1 { font-size: 1.1rem; }
    #shooter-canvas { display: block; margin: 0 auto; border-radius: 12px; background: #05050f; touch-action: none; width: 100%; max-width: 420px; height: auto; }
    .hud { display: flex; justify-content: space-between; padding: 6px 12px; font-size: 0.85rem; color: #eee; background: rgba(255,255,255,0.06); border-radius: 10px; margin-bottom: 6px; flex-wrap: wrap; gap: 4px; }
    .hud span { font-weight: 600; }
    .shooter-status { padding: 6px 10px !important; margin-bottom: 4px !important; }
    .shooter-status .room-info-bar { margin-bottom: 6px; gap: 6px; }
    .shooter-status .score-board { margin-bottom: 6px; gap: 14px; font-size: 0.9rem; }
    .shooter-status .player-badges { margin-bottom: 4px; }
    .shooter-status #status-text { font-size: 0.8rem; color: #aaa; }
    .bottom-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 420px; padding: 6px 12px; font-size: 0.9rem; color: #eee; background: rgba(255,255,255,0.06); border-radius: 10px; margin-top: 6px; }
    .controls { margin-top: 8px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .canvas-wrap { position: relative; display: inline-block; }
    .start-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(5,5,15,0.92); border-radius: 12px; color: #fff; z-index: 10; cursor: pointer; overflow-y: auto; padding: 12px; }
    .start-overlay h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .start-overlay p { font-size: 0.85rem; color: #aaa; }
    .touch-controls { display: none; justify-content: center; gap: 12px; margin-top: 10px; }
    .touch-btn { width: 64px; height: 64px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; -webkit-user-drag: none; }
    .touch-btn:active { background: rgba(255,255,255,0.2); }
    @media (pointer: coarse) { .touch-controls { display: flex; } }
    .plane-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 10px 0; max-width: 320px; }
    .plane-card { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 6px 4px; cursor: pointer; transition: all .15s; text-align: center; }
    .plane-card:hover, .plane-card.selected { background: rgba(255,255,255,0.18); border-color: #4d96ff; }
    .plane-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(0.7); }
    .plane-card .icon { font-size: 1.4rem; }
    .plane-card .name { font-size: 0.65rem; color: #ddd; margin-top: 2px; }
    .plane-card .cost { font-size: 0.6rem; color: #ffd93d; }
    .coin-bar { color: #ffd93d; font-weight: 700; }
    .help-text { font-size: 0.7rem; color: #888; margin-top: 8px; max-width: 280px; line-height: 1.4; }
    .privacy-hint { font-size: 0.7rem; color: #888; margin-top: 4px; }
    .score-board span { display: inline-block; margin: 0 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="/" class="back-link">← 返回</a>
      <h1>🚀 太空射击</h1>
    </div>

    <div id="lobby" class="screen active">
      <div class="card">
        <div class="form-group">
          <label>你的名字</label>
          <input type="text" id="player-name" placeholder="Player" maxlength="16">
        </div>
        <div class="mode-list">
          <button class="btn btn-primary" onclick="startMode('local')">👤 单机闯关</button>
          <button class="btn btn-secondary" onclick="startMode('online')">🌐 联机开黑</button>
        </div>
      </div>

      <div id="online-panel" class="card" style="margin-top:14px;">
        <div class="form-group" style="margin-bottom:10px;">
          <label class="sound-toggle" title="公开房间会显示在首页房间列表"><input type="checkbox" id="room-public-check" checked> 公开房间（可被搜索）</label>
          <div id="room-privacy-hint" class="privacy-hint"></div>
        </div>
        <button class="btn btn-primary" onclick="createRoom()">➕ 创建房间</button>
        <button class="btn btn-secondary" onclick="showJoin()">🔗 加入房间</button>
        <button class="btn btn-warning" onclick="quickMatch()">⚡ 快速匹配</button>
        <div id="join-form" class="hidden" style="margin-top:12px;">
          <div class="form-group">
            <label>房间号</label>
            <input type="text" id="room-id" placeholder="XXXXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;text-align:center;">
          </div>
          <button class="btn btn-primary" onclick="joinRoom()">进入房间</button>
        </div>
        <div id="error-msg" class="status-bar hidden" style="background:rgba(255,77,77,.15);color:#ff6b6b;"></div>
      </div>

      <div id="leaderboard-panel" class="card" style="margin-top:14px;">
        <h3 style="font-size:1rem;margin-bottom:10px;">🏆 太空射击排行榜</h3>
        <div id="leaderboard-list" style="font-size:0.9rem;">加载中...</div>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="status-bar shooter-status">
        <div class="room-info-bar">
          <span>房间:</span>
          <span id="room-display" class="room-id">-</span>
          <button class="btn btn-ghost" style="width:auto;padding:6px 10px;font-size:.8rem;" id="copy-btn" onclick="copyLink()">📋 复制</button>
          <button class="btn btn-danger" style="width:auto;padding:6px 10px;font-size:.8rem;" onclick="leaveGame()">🚪 离开</button>
        </div>
        <div class="score-board">
          <span>💯 <b id="hud-score">0</b></span>
          <span>❤️ <b id="hud-lives">0</b></span>
          <span>🌊 <b id="hud-wave">1</b></span>
        </div>
        <div class="player-badges">
          <span id="badge-p1" class="badge">P1 <b id="name-p1">-</b></span>
          <span id="badge-p2" class="badge">P2 <b id="name-p2">-</b></span>
        </div>
        <div id="status-text">等待开始...</div>
      </div>

      <div class="canvas-wrap">
        <canvas id="shooter-canvas" width="360" height="560"></canvas>
        <div class="start-overlay" id="start-overlay">
          <h2>🚀 太空射击</h2>
          <p id="overlay-subtitle">消灭外星飞船，保卫银河系！</p>
          <div class="coin-bar" style="margin-top:8px;font-size:1rem;">🪙 金币: <span id="shop-coins">0</span></div>
          <div class="plane-select" id="plane-select"></div>
          <p style="margin-top:6px;font-size:0.9rem;" id="overlay-hint">点击 / 按空格开始</p>
          <div class="help-text">
            操作：键盘方向键 / WASD 或拖拽移动。自动开火。<br>
            每5波出现BOSS。联机模式下房主点击开始。<br>
            护盾破碎时会有短暂无敌，避免卡死。
          </div>
          <button class="btn btn-primary" id="host-start-btn" style="margin-top:10px;display:none;max-width:200px;" onclick="hostStartGame()">▶ 开始游戏</button>
        </div>
      </div>
      <div class="bottom-bar">
        <span class="coin-bar">🪙 金币: <b id="hud-coins">0</b></span>
        <span>🏆 最佳: <b id="hud-best">0</b></span>
      </div>
      <div class="controls" id="local-controls">
        <button class="btn btn-warning" onclick="pauseGame()">⏸ 暂停</button>
      </div>
    </div>
  </div>

  <div id="end-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="end-title">💥 游戏结束</h2>
      <p id="end-subtitle">得分: 0</p>
      <button class="btn btn-primary" id="btn-restart-wave" onclick="restartWave()">重新开始</button>
      <button class="btn btn-ghost" id="btn-back-select" onclick="backToPlaneSelect()">返回选战机</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/sounds.js"></script>
  <script src="/auth.js"></script>
  <script src="/games/shooter.js"></script>
</body>
</html>
