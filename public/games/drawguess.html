<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 画图猜词 - AI 游戏盒子</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="game-header">
      <a href="/" class="back-link">← 返回</a>
      <h1>🎨 AI 画图猜词</h1>
      <div class="settings-row">
        <label class="sound-toggle"><input type="checkbox" id="music-check" checked> 🎵 音乐</label>
        <label class="sound-toggle"><input type="checkbox" id="sfx-check" checked> 🔊 音效</label>
      </div>
    </div>

    <div id="lobby" class="screen active">
      <div class="card">
        <div class="form-group">
          <label>你的名字</label>
          <input type="text" id="player-name" placeholder="Player" maxlength="16">
        </div>
        <div class="mode-list">
          <button class="btn btn-primary" onclick="startMode('single')">🤖 单人挑战</button>
          <button class="btn btn-secondary" onclick="startMode('online')">🌐 在线抢答</button>
        </div>
      </div>

      <div id="online-panel" class="card" style="margin-top:14px;">
        <div class="form-group" style="margin-bottom:10px;">
          <label class="sound-toggle" title="公开房间会显示在首页房间列表，私有房间只能通过房间号加入"><input type="checkbox" id="room-public-check" checked> 公开房间（可被搜索）</label>
        <div id="room-privacy-hint" class="privacy-hint"></div>
        </div>
        <button class="btn btn-primary" onclick="createRoom()">➕ 创建房间</button>
        <button class="btn btn-secondary" onclick="showJoin()">🔗 加入房间</button>
        <button class="btn btn-warning" onclick="quickMatch()">⚡ 快速匹配</button>
        <div id="join-form" class="hidden" style="margin-top:12px;">
          <div class="form-group">
            <label>房间号</label>
            <input type="text" id="room-id" placeholder="XXXXXX" maxlength="6" style="text-transform:uppercase;letter-spacing:.3em;text-align:center;">
          </div>
          <button class="btn btn-primary" onclick="joinRoom()">进入房间</button>
        </div>
        <div id="error-msg" class="status-bar hidden" style="background:rgba(255,77,77,.15);color:#ff6b6b;"></div>
      </div>

      <div id="leaderboard-panel" class="card hidden" style="margin-top:14px;">
        <h3 style="font-size:1rem;margin-bottom:10px;">🏆 猜成语排行榜</h3>
        <div id="leaderboard-list" style="font-size:0.9rem;">加载中...</div>
      </div>
    </div>

    <div id="game" class="screen">
      <div class="status-bar">
        <div class="room-info-bar">
          <span>房间:</span>
          <span id="room-display" class="room-id">-</span>
          <button class="btn btn-ghost" style="width:auto;padding:6px 10px;font-size:.8rem;" id="copy-btn" onclick="copyLink()">📋 复制</button>
        </div>
        <div class="score-board">
          <span id="score-1">0</span> : <span id="score-2">0</span>
        </div>
        <div id="round-text">第 1 / 5 轮</div>
      </div>

      <div class="word-panel">
        <div class="clue-card">
          <div id="loading" class="loading-spinner hidden"></div>
          <img id="draw-image" class="draw-image hidden" alt="AI generated picture">
          <div id="image-error" class="hidden" style="padding:20px 12px;color:#ff6b6b;font-size:0.9rem;">图片加载失败，请重新开始或检查网络。</div>
          <div id="category-text" class="clue-text" style="font-size:1rem;color:#aaa;margin-top:8px;">-</div>
          <div id="hint-text" class="clue-text" style="font-size:0.95rem;color:#ffd166;margin-top:6px;min-height:1.4em;"></div>
          <button class="btn btn-warning" id="hint-btn" onclick="useHint()" style="width:auto;padding:8px 16px;font-size:.85rem;margin-top:8px;">💡 AI 提示</button>
        </div>

        <div class="guess-input">
          <input type="text" id="guess-input" placeholder="输入成语..." autocomplete="off">
          <button class="btn btn-primary" style="width:auto;padding:10px 18px;" onclick="submitGuess()">提交</button>
        </div>

        <div id="message-text" class="status-bar" style="margin-top:0;">-</div>
        <div class="guess-list" id="guess-list"></div>
      </div>

      <div class="controls">
        <button class="btn btn-warning" id="start-btn" onclick="startRound()">▶️ 开始 / 下一轮</button>
        <button class="btn btn-danger" onclick="leaveGame()">🚪 离开</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/sounds.js"></script>
  <script src="/auth.js"></script>
  <script src="/games/drawguess.js"></script>
</body>
</html>
